# ─────────────────────────────────────────────────────────────────
# Nginx config for chatroom – single EC2 node (Nginx → PM2/NestJS)
# ALB handles SSL termination; Nginx listens on port 80.
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── ALB / Route53 health-check ────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;      # keep logs clean
    }

    # ── Frontend — serve React SPA ────────────────────────────────
    location / {
        root /home/ec2-user/app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Socket.IO WebSocket upgrade ───────────────────────────────
    # proxy_read_timeout must exceed ALB idle timeout (4000 s).
    # Keep alive connections so ALB does not drop them.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;   # 24 h – well above ALB 4000 s idle timeout
        proxy_send_timeout 86400s;
    }
}
